<div class="card p-4 mb-4"
    style="background-color: var(--primary-color); background-image: linear-gradient(135deg, var(--primary-color), var(--primary-hover)); color: white; border: none;">
    <h1 class="fw-bold mb-3" style="color: white; font-family: 'Outfit', sans-serif;">📊 Complete Trading Analysis
        Report</h1>

    <div class="row align-items-center">
        <div class="col-md-3"><strong>Trader:</strong> {{ report.metadata.trader_name }}</div>
        <div class="col-md-3"><strong>Period:</strong> {{ report.metadata.analysis_period }}</div>
        <div class="col-md-3"><strong>Generated:</strong> {{ report.metadata.generated_at }}</div>
        <div class="col-md-3 text-end"><span class="badge bg-white text-primary px-3 py-2 fs-6">Risk Score: {{
                report.metadata.risk_score }}/100</span></div>
    </div>
</div>
